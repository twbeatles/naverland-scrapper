name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  quality:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      NAVERLAND_SKIP_PLAYWRIGHT_BROWSER_CHECK: "1"
      NAVERLAND_SKIP_PLAYWRIGHT_TESTS: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall -q app_entry.py src tests

      - name: Run core pytest subset
        run: python -m pytest -q tests/test_parser_module.py tests/test_database_module.py tests/test_ui_wiring.py tests/test_ui_runtime_smoke.py

      - name: Run Pyright
        run: npx --yes pyright

      - name: Preflight check
        run: python -m src.utils.preflight

